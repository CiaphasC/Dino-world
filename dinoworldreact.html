/* ==========================================================================
   Reset base y tokens de layout
   --------------------------------------------------------------------------
   Objetivo: normalizar el box model y asegurar un lienzo estable para
   animaciones con pin y scrub en GSAP.
   ========================================================================== */
:root {
  --scene-ratio-default: 3327 / 2314;
  --bg-cream: #ffffe1;
  --bg-dark: #03061c;
  --font-ui: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  min-height: 100%;
  margin: 0;
}

body {
  min-height: 100svh;
  overflow-x: hidden;
  overflow-y: auto;
  background: var(--bg-dark);
  font-family: var(--font-ui);
}

/* ==========================================================================
   Shell principal
   --------------------------------------------------------------------------
   Nota:
   - `isolation: isolate` evita interferencias de stacking context externos.
   - `overflow-x: clip` previene scroll horizontal por capas parallax.
   ========================================================================== */
.app-shell {
  position: relative;
  width: 100%;
  min-height: 100svh;
  overflow-x: clip;
  isolation: isolate;
  background-color: var(--bg-cream);
}

.hero-shell {
  position: relative;
  width: 100%;
  height: 100svh;
  min-height: 720px;
  overflow: visible;
  isolation: isolate;
  z-index: 40;
}

.site-header {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 55;
  pointer-events: none;
}

.header-canvas {
  position: relative;
  width: min(1680px, 100%);
  height: clamp(6rem, 19vh, 13rem);
  margin: 0 auto;
  padding: 0;
  z-index: 1;
}

.site-header .brand-paw-logo-wrapper,
.site-header .brand-menu-left-wrapper,
.site-header .brand-menu-right-wrapper {
  position: absolute;
  transform-origin: center top;
}

.site-header .brand-paw-logo-wrapper {
  top: clamp(0.25rem, 1.2vh, 0.9rem);
  left: 50%;
  width: clamp(5.9rem, 10.8vw, 11.4rem);
  transform: translateX(-50%);
}

.site-header .brand-menu-left-wrapper,
.site-header .brand-menu-right-wrapper {
  top: clamp(1rem, 2.3vh, 1.8rem);
  width: clamp(12.5rem, 22vw, 23rem);
  pointer-events: auto;
}

.site-header .brand-menu-left-wrapper {
  left: clamp(0.7rem, 4.8vw, 7.6rem);
}

.site-header .brand-menu-right-wrapper {
  right: clamp(0.7rem, 4.8vw, 7.6rem);
}

@media (max-width: 640px) {
  .header-canvas {
    height: clamp(5.2rem, 16vh, 7.3rem);
  }

  .site-header .brand-paw-logo-wrapper {
    top: 0.2rem;
    width: clamp(5.5rem, 17.8vw, 7.2rem);
  }

  .site-header .brand-menu-left-wrapper,
  .site-header .brand-menu-right-wrapper {
    top: clamp(0.9rem, 2.1vh, 1.35rem);
    width: clamp(6.6rem, 34vw, 9.8rem);
  }

  .site-header .brand-menu-left-wrapper {
    left: 0.45rem;
  }

  .site-header .brand-menu-right-wrapper {
    right: 0.45rem;
  }
}

/* ==========================================================================
   Hero stage (escena principal)
   --------------------------------------------------------------------------
   Requisito funcional:
   - Fondo escalable para zoom en scroll.
   - Capa de nubes independiente con fade y drift lateral.
   ========================================================================== */
.hero-stage {
  position: relative;
  width: 100%;
  height: 100svh;
  min-height: 720px;
  overflow: visible;
  isolation: isolate;
  z-index: 40;
  margin-bottom: 0;
  --bg-scale: 1;
}

/* Fondo base del hero:
   Se expande fuera del viewport para evitar bordes visibles durante el zoom. */
.hero-stage::before {
  content: "";
  position: absolute;
  top: -5vh;
  left: -5vw;
  width: 110vw;
  height: 125vh;
  z-index: 0;
  pointer-events: none;
  background-image: var(--shared-landscape-url, none);
  background-repeat: no-repeat;
  background-position: center top;
  background-size: cover;
  filter: contrast(1.06) saturate(1.05) brightness(1.01);
  transform: translateZ(0) scale(var(--bg-scale));
  transform-origin: top center;
  will-change: transform;
}

/* Capa de nubes:
   - Se dibuja por encima del fondo y por debajo de sprites.
   - Usa mask para desvanecer borde inferior y evitar corte duro. */
.image-clouds {
  position: absolute;
  top: -5vh;
  left: -5vw;
  width: 110vw;
  height: 55%;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  background-repeat: repeat-x;
  background-position: 0% top;
  background-size: auto 100%;
  will-change: transform, opacity, background-position;
  -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
  mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
}

.hero-canvas {
  position: absolute;
  top: 50%;
  left: 50%;
  width: max(100vw, calc(100svh * var(--scene-ratio)));
  min-width: 100vw;
  aspect-ratio: var(--scene-ratio-default);
  transform: translate(-50%, -50%);
  z-index: 41;
}

/* ==========================================================================
   Sprites renderizados por JS
   --------------------------------------------------------------------------
   Contrato entre CSS y JS:
   - JS controla posicion/tamano por wrapper.
   - CSS define comportamiento visual comun.
   ========================================================================== */
.sprite-wrapper {
  position: absolute;
  pointer-events: none;
  transform-origin: center center;
  will-change: transform, opacity;
}

.scene-sprite {
  display: block;
  width: 100%;
  height: auto;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
  transform-origin: center center;
  will-change: transform, opacity;
}

.is-interactive {
  pointer-events: auto;
  cursor: pointer;
  transition: opacity 220ms ease;
}

.is-interactive:hover {
  opacity: 0.88;
}

/* ==========================================================================
   Ajustes de profundidad visual (sombras por capa)
   --------------------------------------------------------------------------
   Estos filtros ayudan a mantener lectura de planos durante movimiento.
   ========================================================================== */
.layer-top-canopy,
.layer-vine-top {
  filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.28));
}

.char-trex {
  filter: drop-shadow(0 24px 26px rgba(0, 0, 0, 0.42));
}

.char-skye,
.char-chase,
.char-zuma {
  filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.36));
}

.char-rex,
.char-marshall {
  filter: drop-shadow(0 24px 28px rgba(0, 0, 0, 0.52));
}

.char-rubble {
  filter: drop-shadow(0 16px 22px rgba(0, 0, 0, 0.44));
}

.tech-dino-foot,
.tech-paw,
.tech-meter {
  opacity: 0.8;
}

.leaf-top-left,
.leaf-top-right,
.leaf-bottom-left,
.leaf-bottom-right {
  filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.18));
}

.brand-paw-logo {
  filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.35));
}

.brand-menu-left,
.brand-menu-right {
  filter: drop-shadow(0 12px 16px rgba(0, 0, 0, 0.35));
}

.brand-dino-world {
  filter: drop-shadow(0 22px 28px rgba(0, 0, 0, 0.82));
}

.discover-label {
  opacity: 0.92;
}

/* ==========================================================================
   Body stage
   --------------------------------------------------------------------------
   Objetivo de transicion:
   - Subir desde hero pinneado hacia un fondo crema solido.
   - Degradado superior para esconder el corte entre etapas.
   ========================================================================== */
.body-stage {
  position: relative;
  width: 100%;
  min-height: 100svh;
  overflow: visible;
  isolation: isolate;
  background: var(--bg-cream);
  margin-top: 40vh;
  padding-top: 5vh;
  padding-bottom: clamp(3rem, 8vh, 7rem);
  z-index: 50;
}

.body-stage::before {
  content: "";
  position: absolute;
  bottom: 100%;
  left: 0;
  width: 100%;
  height: 65vh;
  background: linear-gradient(to bottom, rgba(255, 255, 225, 0) 0%, var(--bg-cream) 100%);
  pointer-events: none;
  z-index: -1;
}

.body-canvas {
  position: relative;
  width: 100vw;
  min-width: 100vw;
  aspect-ratio: var(--scene-ratio);
  overflow: hidden;
}

.tail-stage {
  position: relative;
  width: 100%;
  overflow: hidden;
  isolation: isolate;
  background: var(--bg-cream);
  margin-top: 0;
  padding-bottom: clamp(2rem, 6vh, 5rem);
  z-index: 51;
}

.tail-canvas {
  position: relative;
  width: 100vw;
  min-width: 100vw;
  aspect-ratio: var(--scene-ratio);
  overflow: hidden;
}

.body-row4-group {
  position: absolute;
  inset: 0;
  pointer-events: none;
  will-change: transform;
}

/* Recorte PSD row3-left:
   las capas internas quedan independientes, pero visibles solo dentro del marco. */
.body-row3-capa42-wrapper {
  overflow: hidden;
  -webkit-mask-image: var(--row3-mask-url);
  mask-image: var(--row3-mask-url);
  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;
  -webkit-mask-position: center;
  mask-position: center;
  -webkit-mask-size: 100% 100%;
  mask-size: 100% 100%;
  -webkit-mask-mode: alpha;
  mask-mode: alpha;
}

/* ==========================================================================
   Texto de introduccion (antes manejado con utilidades Tailwind)
   --------------------------------------------------------------------------
   Criterio de mantenibilidad:
   - Tipografia y sombras declaradas en CSS.
   - JS solo separa caracteres para animacion incremental.
   ========================================================================== */
.intro-headline-wrapper {
  position: absolute;
  left: 15%;
  top: 13.6%;
  width: 70%;
  z-index: 10;

.intro-headline {

}

.intro-word {
  display: inline-block;
  white-space: nowrap;
}

.intro-char {

}

.intro-space {
  display: inline-block;
  width: 0.28em;
}

/* ==========================================================================
   Modo accesible: reduce motion
   --------------------------------------------------------------------------
   Politica UX:
   - Cuando el usuario pide menos movimiento, reducimos transiciones
     sin romper layout ni funcionalidad principal.
   ========================================================================== */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}

      var reducedMotionMediaQuery =
        typeof window.matchMedia === 'function' ? window.matchMedia('(prefers-reduced-motion: reduce)') : null;

      function prefersReducedMotion() {
        return Boolean(reducedMotionMediaQuery && reducedMotionMediaQuery.matches);
      }

      function toRepoAsset(localPath) {
        if (!localPath) return localPath;
        if (/^https?:\/\//i.test(localPath)) return localPath;

        var normalized = String(localPath).replace(/\\/g, '/').replace(/^\/+/, '');
        var url = normalized.startsWith('assets/')
          ? GITHUB_RAW_BASE_URL + '/public/' + normalized
          : GITHUB_RAW_BASE_URL + '/' + normalized;

        return encodeURI(url);
      }

      function hydrateSprites(sprites) {
        return sprites.map(function (sprite) {
          return Object.assign({}, sprite, { src: toRepoAsset(sprite.src) });
        });
      }

      function joinClasses() {
        return Array.prototype.slice.call(arguments)
          .filter(function (value) {
            return typeof value === 'string' && value.trim().length > 0;
          })
          .join(' ');
      }

      function applyStyleObject(element, styleObj) {
        if (!styleObj) return;

        Object.entries(styleObj).forEach(function (entry) {
          var key = entry[0];
          var value = entry[1];
          if (value === null || value === undefined) return;
          element.style[key] = String(value);
        });
      }

      function renderSpriteLayers(target, sprites, layoutMap) {
        var fragment = document.createDocumentFragment();

        sprites.forEach(function (sprite) {
          var wrapper = document.createElement('div');
          wrapper.className = joinClasses('sprite-wrapper', sprite.wrapperClassName);
          wrapper.dataset.spriteId = sprite.id;

          var layout = layoutMap[sprite.id];
          if (layout && layout.wrapperStyle) {
            applyStyleObject(wrapper, layout.wrapperStyle);
          }

          var image = document.createElement('img');
          image.className = joinClasses(
            'scene-sprite',
            sprite.imageClassName,
            sprite.interactive ? 'is-interactive' : ''
          );
          image.src = sprite.src;
          image.alt = sprite.alt;
          image.draggable = false;

          if (layout && layout.imageStyle) {
            applyStyleObject(image, layout.imageStyle);
          }

          wrapper.appendChild(image);
          fragment.appendChild(wrapper);
        });

        target.appendChild(fragment);
      }

      function prepareHeadlineCharacters(elementId) {
        var element = document.getElementById(elementId);
        if (!element) return;

        var text = element.innerText.trim();
        var words = text.split(' ');
        element.innerHTML = '';

        words.forEach(function (word, wordIndex) {
          var wordSpan = document.createElement('span');
          wordSpan.className = 'intro-word';

          Array.from(word).forEach(function (char) {
            var charSpan = document.createElement('span');
            charSpan.className = 'intro-char';
            charSpan.innerText = char;
            wordSpan.appendChild(charSpan);
          });

          element.appendChild(wordSpan);

          if (wordIndex < words.length - 1) {
            var space = document.createElement('span');
            space.className = 'intro-space';
            space.innerHTML = '&nbsp;';
            element.appendChild(space);
          }
        });
      }

      function initSmoothScroll() {
        if (prefersReducedMotion() || !window.Lenis || !window.gsap || !window.ScrollTrigger) return;

        var lenis = new window.Lenis({
          lerp: 0.08,
          smoothWheel: true,
        });

        lenis.on('scroll', window.ScrollTrigger.update);
        window.gsap.ticker.add(function (time) {
          lenis.raf(time * 1000);
        });
        window.gsap.ticker.lagSmoothing(0);
      }

      function runCloudAnimations(cloudsLayer) {
        var gsap = window.gsap;
        if (!gsap || prefersReducedMotion() || !cloudsLayer) return;

        var bgPosX = 0;
        gsap.ticker.add(function () {
          bgPosX -= 0.8;
          cloudsLayer.style.backgroundPositionX = bgPosX + 'px';
        });

        gsap.to(cloudsLayer, {
          y: '2vh',
          scale: 1.04,
          ease: 'sine.inOut',
          duration: 4.5,
          yoyo: true,
          repeat: -1,
        });
      }

      function runHeroAnimations(stage) {
        var gsap = window.gsap;
        if (prefersReducedMotion() || !gsap) return;

        var selectAll = function (selector) { return Array.from(stage.querySelectorAll(selector)); };
        var characters = gsap.utils.toArray('.js-character', stage);
        var pawLogo = gsap.utils.toArray('.js-paw-logo', stage);
        var menuLeft = gsap.utils.toArray('.js-menu-left', stage);
        var menuRight = gsap.utils.toArray('.js-menu-right', stage);
        var dinoLogo = selectAll('.js-dino-logo');
        var arrows = selectAll('.js-arrow');
        var techUi = selectAll('.js-tech-ui');
        var leaves = selectAll('.js-leaf');
        var vines = selectAll('.js-vine');

        gsap.fromTo(
          characters,
          {
            y: 150,
            opacity: 0,
            scale: 0.5,
            rotation: function (i) { return i % 2 === 0 ? -10 : 10; },
          },
          {
            y: 0,
            opacity: 1,
            scale: 1,
            rotation: 0,
            duration: 1.2,
            stagger: 0.15,
            ease: 'back.out(1.4)',
            onComplete: function () {
              characters.forEach(function (char, i) {
                gsap.to(char, {
                  y: '+=12',
                  rotation: '+=2',
                  duration: 2 + (i % 3) * 0.4,
                  yoyo: true,
                  repeat: -1,
                  ease: 'sine.inOut',
                  delay: i * 0.1,
                });
              });

              gsap.to(techUi, {
                opacity: 0.4,
                duration: 1.5,
                yoyo: true,
                repeat: -1,
                ease: 'power1.inOut',
                stagger: 0.3,
              });

              gsap.to(leaves, {
                rotation: '+=6',
                transformOrigin: 'bottom center',
                duration: 3,
                yoyo: true,
                repeat: -1,
                ease: 'sine.inOut',
                stagger: 0.2,
              });

              gsap.to(vines, {
                rotation: function (i) { return i % 2 === 0 ? 4 : -4; },
                transformOrigin: 'top center',
                duration: 4.5,
                yoyo: true,
                repeat: -1,
                ease: 'sine.inOut',
                stagger: 0.5,
              });
            },
          }
        );

        gsap.fromTo(pawLogo, { y: -100, opacity: 0 }, { y: 0, opacity: 1, duration: 1.5, ease: 'elastic.out(1, 0.5)', delay: 0.2 });
        gsap.fromTo(menuLeft, { x: -100, opacity: 0 }, { x: 0, opacity: 1, duration: 1, ease: 'power3.out', delay: 0.4 });
        gsap.fromTo(menuRight, { x: 100, opacity: 0 }, { x: 0, opacity: 1, duration: 1, ease: 'power3.out', delay: 0.4 });
        gsap.fromTo(
          dinoLogo,
          { scale: 0.5, opacity: 0, y: 50 },
          {
            scale: 1,
            opacity: 1,
            y: 0,
            duration: 1.2,
            ease: 'back.out(1.5)',
            delay: 0.6,
            onComplete: function () {
              gsap.to(dinoLogo, {
                y: '+=6',
                duration: 2,
                yoyo: true,
                repeat: -1,
                ease: 'sine.inOut',
              });
            },
          }
        );

        gsap.fromTo(
          arrows,
          {
            opacity: 0.28,
            filter: 'drop-shadow(0 0 0 rgba(89, 255, 92, 0)) brightness(1)',
          },
          {
            opacity: 1,
            filter: 'drop-shadow(0 0 10px rgba(89, 255, 92, 0.95)) brightness(1.18)',
            duration: 0.62,
            stagger: 0.15,
            yoyo: true,
            repeat: -1,
            ease: 'sine.inOut',
          }
        );
      }

        var dinosEndTrigger = document.querySelector('.body-row4-ampliacion-wrapper');
        
        if (dinosTrigger && dinosEndTrigger) {
          // Ajustamos el punto de pivote a la base de su cuerpo (escondida)
          gsap.set('.body-row4-timmyrex-wrapper', { transformOrigin: 'bottom right' });
          gsap.set('.body-row4-rhubarb-wrapper', { transformOrigin: 'bottom left' });

          var dinosScrubTimeline = gsap.timeline({
            scrollTrigger: {
              trigger: dinosTrigger,
              endTrigger: dinosEndTrigger,
              start: 'top 90%', // Inicia apenas asoma el paisaje a la vista
              end: 'top 60%',   // Termina de mostrarse cuando la ampliación llega a la zona visible
              scrub: 1.5        // El 'scrub' ata la animación al scroll. El '1.5' le da una inercia muy suave y premium.
            }
          });

          // T-Rex (Timmy) moviéndose al ritmo del scroll sin desvanecimiento
          // Usamos un ease muy sutil (power1.out) para que el movimiento se sienta orgánico mientras scrolleas
          dinosScrubTimeline.fromTo('.body-row4-timmyrex-wrapper',
            { y: '35%', x: '-8%', rotation: -18, scale: 0.9 },
            { y: '0%', x: '0%', rotation: 0, scale: 1, ease: 'power1.out' },
            0 // Tiempo cero para que ambos empiecen exactamente a la vez
          );

          // Dinosaurio rojo (Rhubarb) moviéndose al ritmo del scroll sin desvanecimiento
          dinosScrubTimeline.fromTo('.body-row4-rhubarb-wrapper',
            { y: '35%', x: '8%', rotation: 18, scale: 0.9 },
            { y: '0%', x: '0%', rotation: 0, scale: 1, ease: 'power1.out' },
            0
          );
        }

        var refreshScrollTriggers = function () {
          window.requestAnimationFrame(function () {
            ScrollTrigger.refresh();
          });
        };

        if (document.readyState === 'complete') {
          refreshScrollTriggers();
        } else {
          window.addEventListener('load', refreshScrollTriggers, { once: true });
        }

        gsap.to('.body-row2-divider-wrapper .scene-sprite', {
          y: '-=6',
          duration: 2.5,
          yoyo: true,
          repeat: -1,
          ease: 'sine.inOut',
        });
      }

      function runPremiumPlantAnimations() {
        var gsap = window.gsap;
        if (prefersReducedMotion() || !gsap) return;

        // --- 1. HOJAS EXTERNAS DEL MARCO (Costados y arriba) ---
        // Hoja superior izquierda (cuelga)
        gsap.set('.body-row3-capa46-wrapper', { transformOrigin: 'top left' });
        gsap.to('.body-row3-capa46-wrapper', {
          rotation: 6 + Math.random() * 3, // Mayor movimiento (6 a 9 grados)
          duration: 3.5 + Math.random() * 2,
          ease: 'sine.inOut',
          yoyo: true,
          repeat: -1,
          delay: -Math.random() * 4,
        });

        // Hojas laterales/inferiores externas del marco rojo
        var frameExternalBaseLeaves = gsap.utils.toArray('.body-row3-capa39-wrapper, .body-row3-capa40-wrapper, .body-row3-capa45-wrapper');
        frameExternalBaseLeaves.forEach(function (leaf, i) {
          gsap.set(leaf, { transformOrigin: 'bottom center' });
          gsap.to(leaf, {
            rotation: (i % 2 === 0 ? 5 : -5) + (Math.random() * 3), // Mayor movimiento
            scaleY: 1 + (Math.random() * 0.04),
            duration: 3 + Math.random() * 2,
            ease: 'sine.inOut',
            yoyo: true,
            repeat: -1,
            delay: -Math.random() * 4,
          });
        });

        // --- 2. HOJAS INTERNAS DEL MARCO ---
        // Planta azul colgante interna
        gsap.set('.body-row3-left-planta7-wrapper', { transformOrigin: 'top left' });
        gsap.to('.body-row3-left-planta7-wrapper', {
          rotation: 5 + Math.random() * 3, // Un poquito más animada
          duration: 3.5 + Math.random() * 2,
          ease: 'sine.inOut',
          yoyo: true,
          repeat: -1,
          delay: -Math.random() * 4,
        });

        // Plantas inferiores internas
        var frameInternalBaseLeaves = gsap.utils.toArray('.body-row3-left-planta4-wrapper, .body-row3-left-planta3-wrapper, .body-row3-left-planta5-wrapper');
        frameInternalBaseLeaves.forEach(function (leaf, i) {
          gsap.set(leaf, { transformOrigin: 'bottom center' });
          gsap.to(leaf, {
            rotation: (i % 2 === 0 ? 4 : -4) + (Math.random() * 3), // Animación sutil pero notoria
            scaleY: 1 + (Math.random() * 0.05), // Respiración ligeramente más amplia
            duration: 3 + Math.random() * 2,
            ease: 'sine.inOut',
            yoyo: true,
            repeat: -1,
            delay: -Math.random() * 4,
          });
        });

        // --- 3. RESTO DE LA VEGETACIÓN (Escena inferior Dinos) ---
        // Mantiene un movimiento más sutil para no sobrecargar visualmente el bloque grande
        var basePlantsSelectors = [
          '.body-row4-planta7-wrapper', '.body-row4-planta6-wrapper', '.body-row4-planta5-wrapper', '.body-row4-planta-wrapper',
          '.body-row4-planta6-copia-wrapper', '.body-row4-planta5-copia-wrapper', '.body-row4-planta5-copia2-wrapper', '.body-row4-planta3-copia-wrapper'
        ].join(', ');

        var basePlants = gsap.utils.toArray(basePlantsSelectors);
        basePlants.forEach(function (plant, i) {
          gsap.set(plant, { transformOrigin: 'bottom center' });
          gsap.to(plant, {
            rotation: (i % 2 === 0 ? 3 : -3) + (Math.random() * 2),
            scaleY: 1 + (Math.random() * 0.03), 
            duration: 3.5 + Math.random() * 2.5,
            ease: 'sine.inOut',
            yoyo: true,
            repeat: -1,
            delay: -Math.random() * 5,
          });
        });

        // --- 4. TIRAS DE HIERBA BASE ---
        var grassStripsSelectors = [
          '.body-row4-capa62-wrapper', '.body-row4-capa59-wrapper', '.body-row4-capa60-wrapper', 
          '.body-row4-capa61-wrapper', '.body-row4-capa34-wrapper'
        ].join(', ');

        var grassStrips = gsap.utils.toArray(grassStripsSelectors);
        grassStrips.forEach(function (grass, i) {
          gsap.set(grass, { transformOrigin: 'bottom center' });
          gsap.to(grass, {
            x: (i % 2 === 0 ? '0.8%' : '-0.8%'),
            skewX: (i % 2 === 0 ? 0.8 : -0.8),
            duration: 4 + Math.random() * 2,
            ease: 'sine.inOut',
            yoyo: true,
            repeat: -1,
            delay: -Math.random() * 4,
          });
        });
      }

      (function bootstrapDinoWorldSingleFile() {
        var appRootElement = document.getElementById('app-shell');
        var headerCanvas = document.getElementById('header-canvas');
        var heroSceneCanvas = document.getElementById('hero-canvas');
        var bodySceneCanvas = document.getElementById('body-canvas');
        var tailSceneCanvas = document.getElementById('tail-canvas');
        var heroStage = document.querySelector('.hero-stage');
        var cloudsLayer = document.getElementById('image-clouds');

        if (!appRootElement || !headerCanvas || !heroSceneCanvas || !bodySceneCanvas || !tailSceneCanvas || !heroStage || !cloudsLayer) {
          throw new Error('No se pudieron inicializar los contenedores principales de la escena.');
        }

        var hydratedData = Object.assign({}, DATA, {
          headerSprites: hydrateSprites(DATA.headerSprites),
          heroSprites: hydrateSprites(DATA.heroSprites),
          bodyPrefixSprites: hydrateSprites(DATA.bodyPrefixSprites),
          bodyRow3ClipSprites: hydrateSprites(DATA.bodyRow3ClipSprites),
          bodyRow3RightSprites: hydrateSprites(DATA.bodyRow3RightSprites),
          bodyRow4Sprites: hydrateSprites(DATA.bodyRow4Sprites),
          tailSprites: hydrateSprites(DATA.tailSprites),
        });

        heroStage.style.setProperty('--shared-landscape-url', "url('" + toRepoAsset('/assets/hero/paisaje/fondoselva.jpg') + "')");
        cloudsLayer.style.backgroundImage = "url('" + toRepoAsset('/assets/hero/fondo/imgi_7_68ee74b1f45fbfb23fb6405a_clouds.webp') + "')";
        document.documentElement.style.setProperty('--row3-mask-url', "url('" + toRepoAsset('/assets/body/fondo/Capa_42.png') + "')");

        heroSceneCanvas.style.setProperty('--scene-ratio', String(hydratedData.heroSceneRatio));
        bodySceneCanvas.style.setProperty('--scene-ratio', String(hydratedData.bodySceneRatio));
        tailSceneCanvas.style.setProperty('--scene-ratio', String(hydratedData.tailSceneRatio));

        renderSpriteLayers(headerCanvas, hydratedData.headerSprites, hydratedData.spriteLayoutMap);
        renderSpriteLayers(heroSceneCanvas, hydratedData.heroSprites, hydratedData.spriteLayoutMap);

        var introWrapper = bodySceneCanvas.querySelector('.intro-headline-wrapper');
        if (introWrapper) {
          introWrapper.remove();
        }

        renderSpriteLayers(bodySceneCanvas, hydratedData.bodyPrefixSprites, hydratedData.spriteLayoutMap);

        var row3Container = document.createElement('div');
        row3Container.className = 'sprite-wrapper body-row3-layer-wrapper body-row3-capa42-wrapper';
        row3Container.dataset.spriteId = hydratedData.BODY_ROW3_CONTAINER_ID;
        applyStyleObject(row3Container, hydratedData.spriteLayoutMap[hydratedData.BODY_ROW3_CONTAINER_ID] && hydratedData.spriteLayoutMap[hydratedData.BODY_ROW3_CONTAINER_ID].wrapperStyle);
        renderSpriteLayers(row3Container, hydratedData.bodyRow3ClipSprites, hydratedData.spriteLayoutMap);
        bodySceneCanvas.appendChild(row3Container);

        renderSpriteLayers(bodySceneCanvas, hydratedData.bodyRow3RightSprites, hydratedData.spriteLayoutMap);

        var row4Group = document.createElement('div');
        row4Group.className = 'body-row4-group';
        renderSpriteLayers(row4Group, hydratedData.bodyRow4Sprites, hydratedData.spriteLayoutMap);
        bodySceneCanvas.appendChild(row4Group);

        if (introWrapper) {
          bodySceneCanvas.appendChild(introWrapper);
        }

        renderSpriteLayers(tailSceneCanvas, hydratedData.tailSprites, hydratedData.spriteLayoutMap);

        initSmoothScroll();
        runCloudAnimations(cloudsLayer);
        runHeroAnimations(heroSceneCanvas);
        runHeroScrollTransition();
        runBodySectionAnimations();
        runPremiumPlantAnimations();
      })();
    </script>
  </body>
</html>
